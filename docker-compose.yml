services:
  blueprint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueprint
    ports:
      - '7866:3000'
    volumes:
      - joshua26_workspace:/mnt/workspace
      - joshua26_storage:/mnt/storage
    environment:
      - CLAUDE_HOME=/mnt/workspace/blueprint/.claude
      - CLAUDE_CONFIG_DIR=/mnt/workspace/blueprint/.claude
      - BLUEPRINT_DATA=/mnt/workspace/blueprint/data
      - HOME=/home/hopper
      - MAX_TMUX_SESSIONS=50
    restart: unless-stopped

volumes:
  joshua26_workspace:
    external: true
  joshua26_storage:
    external: true
