services:
  blueprint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueprint
    ports:
      - '7866:3000'
    volumes:
      - joshua26_workspace:/workspace
      - joshua26_storage:/storage
    environment:
      - WORKSPACE=/workspace/blueprint/projects
      - CLAUDE_HOME=/workspace/blueprint/.claude
      - CLAUDE_CONFIG_DIR=/workspace/blueprint/.claude
      - BLUEPRINT_DATA=/workspace/blueprint/data
      - HOME=/home/hopper
      - MAX_TMUX_SESSIONS=50
    restart: unless-stopped

volumes:
  joshua26_workspace:
    external: true
  joshua26_storage:
    external: true
