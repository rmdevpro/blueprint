<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --border: #30363d;
      --danger: #f85149;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('/blueprint-preview.png') center/cover no-repeat;
      filter: blur(4px) brightness(0.3);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 460px;
      width: 90%;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 44px 36px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Template mode ── */
    .steps {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: left;
      margin-bottom: 24px;
    }

    .steps h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .steps ol {
      padding-left: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 2;
    }

    .steps code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 28px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Password mode ── */
    .login-form { display: none; }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .footer {
      margin-top: 24px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <img src="/planlogo.png" alt="Blueprint" style="width:180px;margin-bottom:16px;border-radius:8px">
    <p class="subtitle">Agentic Workbench</p>

    <!-- Template mode content -->
    <div id="template-content" class="hidden">
      <div class="steps">
        <h3>Get Started</h3>
        <ol>
          <li>Duplicate this Space to your account</li>
          <li>Make your Space <strong>private</strong></li>
          <li>Authenticate to your Claude account or API</li>
          <li>Start working</li>
        </ol>
      </div>

      <a class="btn-primary" href="https://huggingface.co/spaces/aristotle9/agentic-workbench?duplicate=true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
        Duplicate this Space
      </a>

      <div class="footer">
        Built by <a href="https://rmdevpro.github.io/">J. Morrissette</a>
      </div>
    </div>

    <!-- Password mode content -->
    <div id="password-content" class="hidden">
      <div class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password">
        </div>
        <div class="login-error" id="login-error">Invalid username or password</div>
        <button class="btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <script>
    // __GATE_MODE_INJECT__
    const mode = typeof __GATE_MODE__ !== 'undefined' ? __GATE_MODE__ : 'template';

    if (mode === 'template') {
      document.getElementById('template-content').classList.remove('hidden');
    } else if (mode === 'password') {
      const pc = document.getElementById('password-content');
      pc.classList.remove('hidden');
      pc.querySelector('.login-form').style.display = 'block';
    }

    async function doLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/gate/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (res.ok) {
          window.location.reload();
        } else {
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      }
    }

    // Submit on Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && mode === 'password') doLogin();
    });
  </script>
</body>
</html>
