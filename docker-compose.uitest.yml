services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workbench-test
    ports:
      - '7867:3000'
    volumes:
      - workbench_test_data:/data
    environment:
      - HOME=/data
      - WORKSPACE=/data/workspace
      - CLAUDE_HOME=/data/.claude
      - CLAUDE_CONFIG_DIR=/data/.claude
      - WORKBENCH_DATA=/data/.workbench
      - MAX_TMUX_SESSIONS=50
    restart: unless-stopped

volumes:
  workbench_test_data:
