# Test isolation compose override per §3.1
# Usage: docker compose -p blueprint-test -f docker-compose.yml -f docker-compose.test.yml up -d

services:
  blueprint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueprint-test-blueprint-1
    ports:
      - '7867:3000'
    volumes:
      - blueprint-test_data:/data
      - ./tests/fixtures/stub-claude.sh:/usr/local/bin/claude:ro
    environment:
      - PORT=3000
      - HOME=/data
      - WORKSPACE=/data/workspace
      - CLAUDE_HOME=/data/.claude
      - CLAUDE_CONFIG_DIR=/data/.claude
      - BLUEPRINT_DATA=/data/.blueprint
      - MAX_TMUX_SESSIONS=10
      - TMUX_CLEANUP_MINUTES=2
      - LOG_LEVEL=DEBUG
    networks:
      - blueprint-test
    dns:
      - 127.0.0.1
    restart: 'no'

networks:
  blueprint-test:
    driver: bridge

volumes:
  blueprint-test_data:
