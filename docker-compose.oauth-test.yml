services:
  blueprint-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueprint-oauth-test
    ports:
      - '7880:3000'
    tmpfs:
      - /mnt/workspace
      - /mnt/storage
    environment:
      - CLAUDE_HOME=/home/blueprint/.claude
      - CLAUDE_CONFIG_DIR=/home/blueprint/.claude
      - BLUEPRINT_DATA=/home/blueprint/.blueprint
      - HOME=/home/blueprint
      - MAX_TMUX_SESSIONS=5
    restart: "no"
