services:
  workbench-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workbench-oauth-test
    ports:
      - '7880:3000'
    tmpfs:
      - /mnt/workspace
      - /mnt/storage
    environment:
      - HOME=/data
      - CLAUDE_HOME=/data/.claude
      - CLAUDE_CONFIG_DIR=/data/.claude
      - WORKBENCH_DATA=/data/.workbench
      - MAX_TMUX_SESSIONS=5
    restart: "no"
